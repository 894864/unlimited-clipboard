name: Publish ZIP release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Check out tagged source
        uses: actions/checkout@v4

      - name: Validate release version
        shell: powershell
        run: |
          $tag = '${{ github.ref_name }}'
          if ($tag -notmatch '^v\d+\.\d+\.\d+$') {
            throw "Release tag must use vMAJOR.MINOR.PATCH: $tag"
          }
          $version = $tag.Substring(1)
          $manifest = Get-Content -LiteralPath 'website\releases.json' -Raw | ConvertFrom-Json
          if ([string]$manifest.version -ne $version) {
            throw "Tag $tag does not match website/releases.json version $($manifest.version)."
          }
          "RELEASE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Verify ZIP release asset
        shell: powershell
        run: |
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $exe = "website\download\unlimited-clipboard-setup-v$env:RELEASE_VERSION.exe"
          $zip = "website\download\unlimited-clipboard-windows-v$env:RELEASE_VERSION.zip"
          $manifest = Get-Content -LiteralPath 'website\releases.json' -Raw | ConvertFrom-Json
          if (-not (Test-Path -LiteralPath $exe)) { throw "Missing update package: $exe" }
          if (-not (Test-Path -LiteralPath $zip)) { throw "Missing release asset: $zip" }
          $exeHash = (Get-FileHash -LiteralPath $exe -Algorithm SHA256).Hash
          if ($exeHash -ne [string]$manifest.sha256) {
            throw "EXE hash does not match website/releases.json."
          }
          $archive = [IO.Compression.ZipFile]::OpenRead((Resolve-Path -LiteralPath $zip))
          try {
            $expected = "unlimited-clipboard-setup-v$env:RELEASE_VERSION.exe"
            $entries = @($archive.Entries)
            if ($entries.Count -ne 1 -or $entries[0].FullName -ne $expected) {
              throw "ZIP must contain only $expected; found: $($entries.FullName -join ', ')"
            }
            $stream = $entries[0].Open()
            try {
              $sha = [Security.Cryptography.SHA256]::Create()
              try { $zipExeHash = ([BitConverter]::ToString($sha.ComputeHash($stream))).Replace('-', '') }
              finally { $sha.Dispose() }
            } finally {
              $stream.Dispose()
            }
            if ($zipExeHash -ne $exeHash) {
              throw "ZIP contents do not match the update EXE."
            }
          } finally {
            $archive.Dispose()
          }

      - name: Publish GitHub Release ZIP
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = '${{ github.ref_name }}'
          $asset = "website\download\unlimited-clipboard-windows-v$env:RELEASE_VERSION.zip"
          gh release view $tag 2>$null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $asset --clobber
          } else {
            gh release create $tag $asset --title $tag --generate-notes
          }
