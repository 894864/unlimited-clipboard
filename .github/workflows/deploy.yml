name: Deploy Unlimited Clipboard website

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: unlimited-clipboard-production
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ vars.DEPLOYMENT_READY == 'true' }}
    runs-on: ubuntu-latest
    environment: production
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
    steps:
      - name: Configure deployment SSH key
        shell: bash
        run: |
          set -euo pipefail
          install -d -m 700 "$HOME/.ssh"
          printf '%s\n' "$DEPLOY_SSH_KEY" > "$HOME/.ssh/id_ed25519"
          chmod 600 "$HOME/.ssh/id_ed25519"
          printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/known_hosts"

      - name: Update production checkout and reload PM2
        shell: bash
        run: |
          set -euo pipefail
          ssh -p "${DEPLOY_PORT:-22}" "$DEPLOY_USER@$DEPLOY_HOST" 'bash -se' <<'REMOTE'
          set -euo pipefail
          cd /opt/unlimited-clipboard
          for attempt in 1 2 3; do
            if git -c http.version=HTTP/1.1 pull --ff-only origin main; then
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "git pull failed after 3 attempts" >&2
              exit 1
            fi
            sleep 5
          done
          npm ci --omit=dev --prefix website
          pm2 reload ecosystem.config.cjs --only unlimited-clipboard --update-env
          curl --fail --silent --show-error http://127.0.0.1:3001/healthz
          REMOTE
